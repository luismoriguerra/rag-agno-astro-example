openapi: 3.1.0
info:
  title: AgentOS Chat Search API
  version: 0.1.0
  description: >
    FastAPI contract for the AgentOS-backed chat experience. Protected routes require
    Auth0 Bearer JWT access tokens with the access:api scope.
servers:
  - url: http://localhost:8000
    description: Local backend
components:
  securitySchemes:
    Auth0Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Auth0 access token for the application API (audience = AUTH0_API_AUDIENCE,
        scope includes access:api).
paths:
  /health:
    get:
      summary: Backend health check
      operationId: getHealth
      responses:
        "200":
          description: Backend is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/chat/sessions:
    get:
      summary: List current identity chat sessions
      security:
        - Auth0Bearer: []
      operationId: listChatSessions
      responses:
        "200":
          description: Sessions owned by the current identity
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatSession"
    post:
      summary: Create a new persisted chat session
      security:
        - Auth0Bearer: []
      operationId: createChatSession
      responses:
        "201":
          description: New session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
  /api/chat/sessions/{session_id}:
    get:
      summary: Restore one chat session transcript
      security:
        - Auth0Bearer: []
      operationId: getChatSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session with messages and sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete the active chat session and stop future context use
      security:
        - Auth0Bearer: []
      operationId: deleteChatSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Session deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /api/chat/sessions/{session_id}/messages:
    post:
      summary: Submit a message and start an agent run
      security:
        - Auth0Bearer: []
      operationId: createChatMessage
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "202":
          description: Message accepted and run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/chat/runs/{run_id}/stream:
    get:
      summary: Stream safe progress and answer events for an agent run
      security:
        - Auth0Bearer: []
      operationId: streamAgentRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                thinking:
                  value: "event: thinking\ndata: {\"status\":\"searching\",\"message\":\"Searching public web results\"}\n\n"
                token:
                  value: "event: token\ndata: {\"text\":\"DuckDuckGo found\"}\n\n"
                source:
                  value: "event: source\ndata: {\"title\":\"Example\",\"url\":\"https://example.com\",\"rank\":1}\n\n"
                done:
                  value: "event: done\ndata: {\"run_id\":\"00000000-0000-0000-0000-000000000000\",\"status\":\"completed\"}\n\n"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/chat/runs/{run_id}/stop:
    post:
      summary: Stop an active agent run
      security:
        - Auth0Bearer: []
      operationId: stopAgentRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "202":
          description: Stop requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Run is already terminal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found for current identity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid mock identity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy]
    ChatSession:
      type: object
      required: [id, title, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ChatSessionDetail:
      allOf:
        - $ref: "#/components/schemas/ChatSession"
        - type: object
          required: [messages]
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/ChatMessage"
    ChatMessage:
      type: object
      required: [id, role, content, status, sequence_index, created_at]
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system_status]
        content:
          type: string
        status:
          type: string
          enum: [complete, streaming, stopped, failed]
        sequence_index:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
    SearchResult:
      type: object
      required: [title, url, rank]
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        snippet:
          type: string
        rank:
          type: integer
          minimum: 1
    CreateMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
    CreateMessageResponse:
      type: object
      required: [message, run]
      properties:
        message:
          $ref: "#/components/schemas/ChatMessage"
        run:
          $ref: "#/components/schemas/RunStatus"
    RunStatus:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, stopping, stopped, completed, failed]
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
